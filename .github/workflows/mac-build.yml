name: Build macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS Executable
        run: |
          # Use colon (:) instead of semicolon (;) for --add-data on macOS/Linux
          # Use --windowed to create a proper macOS .app bundle
          pyinstaller --windowed --noconfirm \
            --name YouTubeKnowledgeClipperMac \
            --add-data "author.png:." \
            --add-data "help.png:." \
            --add-data "prompt_templates.json:." \
            --hidden-import customtkinter \
            --hidden-import faster_whisper \
            --hidden-import youtube_transcript_api \
            --hidden-import yt_dlp \
            --hidden-import pyperclip \
            --hidden-import keyboard \
            --hidden-import PIL.ImageTk \
            app.py

      - name: Zip App Bundle
        run: |
          cd dist
          zip -ry YouTubeKnowledgeClipper-macOS.zip YouTubeKnowledgeClipperMac.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeKnowledgeClipper-macOS
          path: dist/YouTubeKnowledgeClipper-macOS.zip
